name: astroweb_mobile
description: "A new Flutter project for Cyber Mystic Astrology."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.2
  go_router: ^14.7.3
  lunar: ^1.4.1 # Gần giống lunar-javascript nhất
  flutter_svg: ^2.0.10+1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
